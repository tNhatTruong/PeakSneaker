version: '3.9'
services:
  db:
    image: postgres:16
    container_name: peaksneaker_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: peaksneaker
    ports:
      - "5433:5432"
    volumes:
      - peaksneaker_postgres_data:/var/lib/postgresql/data
volumes:
  peaksneaker_postgres_data:
